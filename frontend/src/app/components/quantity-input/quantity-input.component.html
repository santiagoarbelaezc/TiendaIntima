<div class="inline-flex items-center rounded-full border border-black/10 bg-white p-1">
  <button type="button" class="h-9 w-9 rounded-full text-lg hover:bg-black/5" (click)="decrease()">−</button>
  <span class="w-10 text-center text-sm font-semibold">{{ value }}</span>
  <button type="button" class="h-9 w-9 rounded-full text-lg hover:bg-black/5" (click)="increase()">+</button>
</div>
