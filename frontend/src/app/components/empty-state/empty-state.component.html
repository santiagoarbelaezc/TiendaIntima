<div class="mx-auto flex max-w-xl flex-col items-center gap-4 rounded-[32px] border border-black/10 bg-white p-10 text-center shadow-soft">
  <h3 class="section-title text-3xl text-[#111111]">{{ title }}</h3>
  <p class="max-w-md text-sm leading-6 text-black/65">{{ description }}</p>
  <a *ngIf="actionLabel && actionRoute" [routerLink]="actionRoute">
    <app-button>{{ actionLabel }}</app-button>
  </a>
</div>
