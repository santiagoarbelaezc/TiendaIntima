<div class="space-y-4">
  <!-- Buscador -->
  <div *ngIf="searchKey" class="flex justify-between items-center gap-4">
    <div class="relative w-full max-w-sm">
      <input 
        type="text" 
        [(ngModel)]="searchTerm" 
        (ngModelChange)="onSearchChange()"
        [placeholder]="searchPlaceholder" 
        class="w-full rounded-2xl border border-black/10 bg-white px-4 py-2.5 pl-10 text-sm outline-none focus:border-black/30 focus:ring-2 focus:ring-black/5 transition"
      />
      <svg class="w-4 h-4 text-black/40 absolute left-3.5 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
      </svg>
    </div>
    <div class="text-xs text-black/50 font-medium">
      Total: <span class="font-bold text-[#111111]">{{ filteredData.length }}</span> registros
    </div>
  </div>

  <!-- Contenedor Tabla -->
  <div class="overflow-x-auto rounded-[28px] border border-black/10 bg-white shadow-soft">
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="border-b border-black/5 bg-[#FAFAFA]/80 text-[11px] font-bold uppercase tracking-wider text-black/50">
          <th 
            *ngFor="let col of columns" 
            class="px-6 py-4"
            [ngClass]="{'text-center': col.align === 'center', 'text-right': col.align === 'right'}"
          >
            {{ col.header }}
          </th>
          <th class="px-6 py-4 text-right">Acciones</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-black/5 text-sm">
        <tr *ngFor="let row of paginatedData" class="hover:bg-black/[0.015] transition-colors">
          <td 
            *ngFor="let col of columns" 
            class="px-6 py-4 font-medium text-[#111111]"
            [ngClass]="{'text-center': col.align === 'center', 'text-right': col.align === 'right'}"
          >
            <ng-container [ngSwitch]="col.type">
              <!-- Currency -->
              <span *ngSwitchCase="'currency'" class="font-bold">
                ${{ row[col.key] | number:'1.0-0' }}
              </span>
              <!-- Date -->
              <span *ngSwitchCase="'date'" class="text-black/60 text-xs">
                {{ row[col.key] | date:'mediumDate' }}
              </span>
              <!-- Status / Badge -->
              <span *ngSwitchCase="'badge'" class="inline-block">
                <span class="px-2.5 py-1 rounded-full text-xs font-bold bg-black/5 text-[#111111]">
                  {{ row[col.key] }}
                </span>
              </span>
              <!-- Default Text -->
              <span *ngSwitchDefault class="text-black/80">
                {{ row[col.key] }}
              </span>
            </ng-container>
          </td>

          <!-- Columna Acciones -->
          <td class="px-6 py-4 text-right whitespace-nowrap space-x-2">
            <button 
              type="button" 
              (click)="onAction('edit', row)"
              class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl text-xs font-semibold bg-[#FAFAFA] border border-black/10 text-[#111111] hover:bg-black/5 transition"
            >
              <span>Editar</span>
            </button>
            <button 
              type="button" 
              (click)="onAction('delete', row)"
              class="inline-flex items-center gap-1 px-3 py-1.5 rounded-xl text-xs font-semibold text-rose-600 hover:bg-rose-50 transition"
            >
              <span>Eliminar</span>
            </button>
          </td>
        </tr>

        <!-- Empty State -->
        <tr *ngIf="paginatedData.length === 0">
          <td [attr.colspan]="columns.length + 1" class="px-6 py-12 text-center text-black/40">
            <div class="flex flex-col items-center justify-center gap-2">
              <svg class="w-8 h-8 text-black/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4" />
              </svg>
              <p class="text-sm font-medium">{{ emptyMessage }}</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Paginación -->
  <div *ngIf="totalPages > 1" class="flex items-center justify-between px-2 text-xs font-medium text-black/60">
    <div>
      Página <span class="font-bold text-[#111111]">{{ currentPage }}</span> de <span class="font-bold text-[#111111]">{{ totalPages }}</span>
    </div>
    <div class="flex items-center gap-2">
      <button 
        type="button" 
        (click)="prevPage()" 
        [disabled]="currentPage === 1"
        class="px-3 py-1.5 rounded-xl border border-black/10 bg-white text-[#111111] disabled:opacity-40 disabled:pointer-events-none hover:bg-black/5 transition"
      >
        Anterior
      </button>
      <button 
        type="button" 
        (click)="nextPage()" 
        [disabled]="currentPage === totalPages"
        class="px-3 py-1.5 rounded-xl border border-black/10 bg-white text-[#111111] disabled:opacity-40 disabled:pointer-events-none hover:bg-black/5 transition"
      >
        Siguiente
      </button>
    </div>
  </div>
</div>
