<div class="flex flex-wrap gap-2">
  <button type="button" *ngFor="let size of sizes" class="rounded-full border px-4 py-2 text-sm transition" [ngClass]="selected === size ? 'border-[#111111] bg-[#111111] text-white' : 'border-black/10 bg-white'" (click)="selectSize(size)">
    {{ size }}
  </button>
</div>
