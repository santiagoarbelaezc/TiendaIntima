<div class="space-y-8 animate-in fade-in duration-300">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
    <div>
      <h1 class="text-3xl font-extrabold tracking-tight text-[#111111]">Gestión de Usuarios</h1>
      <p class="text-sm text-black/60 mt-1">Administra las cuentas registradas y gestiona permisos de administrador.</p>
    </div>
  </div>

  <!-- Tabla de Usuarios -->
  <app-data-table 
    [columns]="columns" 
    [data]="formattedUsers" 
    searchKey="nombre" 
    searchPlaceholder="Buscar por nombre de cliente o admin..."
    emptyMessage="No hay usuarios registrados en este momento."
    (actionClick)="onTableAction($event)"
  ></app-data-table>

  <!-- Modal para Editar Rol de Usuario -->
  <div *ngIf="showModal() && selectedUser() as user" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/40 backdrop-blur-sm" (click)="closeModal()"></div>
    
    <div class="relative w-full max-w-md rounded-[32px] bg-white p-6 sm:p-8 shadow-2xl z-10 animate-in zoom-in-95 duration-200 border border-black/10">
      <div class="text-center space-y-3">
        <div class="mx-auto h-16 w-16 rounded-full bg-[#FAFAFA] border border-black/10 flex items-center justify-center text-xl font-bold text-[#111111]">
          {{ user.nombre[0].toUpperCase() }}
        </div>
        <h3 class="text-xl font-extrabold text-[#111111]">{{ user.nombre }}</h3>
        <p class="text-xs text-black/50">{{ user.email }} &bull; {{ user.telefono }}</p>
      </div>

      <div class="mt-6 p-4 rounded-2xl bg-[#FAFAFA] border border-black/5 text-center">
        <p class="text-xs font-semibold text-black/60 uppercase tracking-wider">Rol Actual</p>
        <p class="text-lg font-extrabold text-[#111111] mt-1">{{ (user.rol || 'cliente').toUpperCase() }}</p>
      </div>

      <div class="mt-8 flex flex-col gap-3">
        <button 
          type="button" 
          (click)="toggleRol()"
          class="w-full py-3.5 px-6 rounded-full text-sm font-bold transition shadow-soft flex items-center justify-center gap-2"
          [ngClass]="user.rol === 'admin' ? 'bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200' : 'bg-[#111111] text-white hover:bg-black/80'"
        >
          <span>{{ user.rol === 'admin' ? 'Revocar permisos de Admin' : 'Convertir en Administrador' }}</span>
        </button>
        <button 
          type="button" 
          (click)="closeModal()"
          class="w-full py-3 px-6 rounded-full text-xs font-bold text-black/60 hover:bg-black/5 transition"
        >
          Cancelar
        </button>
      </div>
    </div>
  </div>
</div>
