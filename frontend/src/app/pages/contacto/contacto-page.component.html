<div class="page-container grid gap-8 py-6 xl:grid-cols-[1fr_0.9fr] xl:py-8">
  <section class="space-y-6 rounded-[32px] border border-black/10 bg-white p-6 shadow-soft lg:p-8">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-black/45">Contacto</p>
      <h1 class="section-title text-4xl text-[#111111]">Hablemos de tu próxima compra</h1>
    </div>
    <form class="grid gap-4" [formGroup]="form" (ngSubmit)="submit()">
      <label class="space-y-2 text-sm"><span class="font-semibold">Nombre</span><input formControlName="nombre" class="w-full rounded-full border border-black/10 px-4 py-3"></label>
      <label class="space-y-2 text-sm"><span class="font-semibold">Email</span><input formControlName="email" type="email" class="w-full rounded-full border border-black/10 px-4 py-3"></label>
      <label class="space-y-2 text-sm"><span class="font-semibold">Mensaje</span><textarea formControlName="mensaje" rows="5" class="w-full rounded-[24px] border border-black/10 px-4 py-3"></textarea></label>
      <p class="text-sm text-green-700" *ngIf="successMessage()">{{ successMessage() }}</p>
      <app-button type="submit">Enviar</app-button>
    </form>
  </section>

  <aside class="space-y-6 rounded-[32px] border border-black/10 bg-[#111111] p-6 text-white shadow-soft lg:p-8">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-white/45">Atención</p>
      <h2 class="section-title mt-2 text-4xl">Tiendaintima</h2>
    </div>
    <div class="space-y-4 text-sm text-white/75">
      <p>Instagram: &#64;tiendaintima</p>
      <p>WhatsApp: +57 300 123 4567</p>
      <p>Servicio a domicilio y recogida en tienda física boutique.</p>
    </div>
  </aside>
</div>
