<div 
  [ngClass]="categoryQuery() === 'lenceria' ? 'bg-[#0A0A0A] text-white p-6 md:p-10 rounded-[32px] border border-white/5 shadow-2xl' : ''"
  class="page-container grid gap-8 py-6 xl:grid-cols-[320px_1fr] xl:py-8 transition-all duration-500"
>
  <aside 
    [ngClass]="categoryQuery() === 'lenceria' ? 'bg-white/5 border-white/10 text-white shadow-none' : 'bg-white border-black/10 text-[#111111] shadow-soft'"
    class="space-y-6 rounded-[32px] border p-6 xl:sticky xl:top-28 xl:h-fit transition-colors duration-500"
  >
    <div>
      <p class="text-xs uppercase tracking-[0.35em]" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/40' : 'text-black/45'">Filtro</p>
      <h1 class="section-title mt-2 text-4xl" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white' : 'text-[#111111]'">Catálogo</h1>
    </div>

    <label class="block space-y-2 text-sm">
      <span class="font-semibold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/80' : 'text-black/80'">Buscar</span>
      <input 
        [(ngModel)]="searchTerm" 
        (ngModelChange)="applyFilters()" 
        [ngModelOptions]="{ standalone: true }" 
        type="search" 
        placeholder="Encuentra tu prenda" 
        [ngClass]="categoryQuery() === 'lenceria' ? 'bg-white/5 border-white/15 text-white focus:border-white/40' : 'bg-white border-black/10 text-[#111111] focus:border-black/30'"
        class="w-full rounded-full border px-4 py-3 outline-none transition"
      >
    </label>

    <label class="block space-y-2 text-sm">
      <span class="font-semibold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/80' : 'text-black/80'">Categoría</span>
      <select 
        [(ngModel)]="categoryFilter" 
        (ngModelChange)="applyFilters()" 
        [ngModelOptions]="{ standalone: true }" 
        [ngClass]="categoryQuery() === 'lenceria' ? 'bg-[#141414] border-white/15 text-white focus:border-white/40' : 'bg-white border-black/10 text-[#111111] focus:border-black/30'"
        class="w-full rounded-full border px-4 py-3 outline-none transition"
      >
        <option value="all">Todas</option>
        <option *ngFor="let category of categories()" [value]="category.slug">{{ category.nombre }}</option>
      </select>
    </label>

    <label class="block space-y-2 text-sm">
      <span class="font-semibold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/80' : 'text-black/80'">Ordenar</span>
      <select 
        [(ngModel)]="sortBy" 
        (ngModelChange)="applyFilters()" 
        [ngModelOptions]="{ standalone: true }" 
        [ngClass]="categoryQuery() === 'lenceria' ? 'bg-[#141414] border-white/15 text-white focus:border-white/40' : 'bg-white border-black/10 text-[#111111] focus:border-black/30'"
        class="w-full rounded-full border px-4 py-3 outline-none transition"
      >
        <option value="relevancia">Relevancia</option>
        <option value="precio-asc">Precio: menor a mayor</option>
        <option value="precio-desc">Precio: mayor a menor</option>
        <option value="novedades">Novedades</option>
      </select>
    </label>
  </aside>

  <section class="space-y-6">
    <div class="flex flex-wrap items-end justify-between gap-4">
      <div>
        <p class="text-xs uppercase tracking-[0.35em]" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/40' : 'text-black/45'">Productos</p>
        <h2 class="section-title text-4xl" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white' : 'text-[#111111]'">Tu selección curada</h2>
      </div>
      <p class="text-sm" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/60' : 'text-black/55'">{{ filteredProducts().length }} productos encontrados</p>
    </div>

    <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
      <app-product-card 
        *ngFor="let product of filteredProducts()" 
        [product]="product"
        [theme]="categoryQuery() === 'lenceria' ? 'dark' : 'light'"
      ></app-product-card>
    </div>

    <app-empty-state
      *ngIf="filteredProducts().length === 0"
      title="No encontramos resultados"
      description="Prueba ajustando los filtros de búsqueda, categoría o precio para descubrir otras piezas de la colección."
      actionLabel="Volver al inicio"
      actionRoute="/"
    ></app-empty-state>
  </section>
</div>
