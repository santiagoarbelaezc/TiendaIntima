<div class="page-container grid gap-8 py-6 xl:grid-cols-[320px_1fr] xl:py-8">
  <aside class="space-y-6 rounded-[32px] border border-black/10 bg-white p-6 shadow-soft xl:sticky xl:top-28 xl:h-fit">
    <div>
      <p class="text-xs uppercase tracking-[0.35em] text-black/45">Filtro</p>
      <h1 class="section-title mt-2 text-4xl text-[#111111]">Catálogo</h1>
    </div>

    <label class="block space-y-2 text-sm">
      <span class="font-semibold text-black/80">Buscar</span>
      <input [(ngModel)]="searchTerm" (ngModelChange)="applyFilters()" [ngModelOptions]="{ standalone: true }" type="search" placeholder="Encuentra tu prenda" class="w-full rounded-full border border-black/10 px-4 py-3 outline-none focus:border-black/30">
    </label>

    <label class="block space-y-2 text-sm">
      <span class="font-semibold text-black/80">Categoría</span>
      <select [(ngModel)]="categoryFilter" (ngModelChange)="applyFilters()" [ngModelOptions]="{ standalone: true }" class="w-full rounded-full border border-black/10 px-4 py-3 outline-none focus:border-black/30">
        <option value="all">Todas</option>
        <option *ngFor="let category of categories()" [value]="category.slug">{{ category.nombre }}</option>
      </select>
    </label>

    <label class="block space-y-2 text-sm">
      <span class="font-semibold text-black/80">Ordenar</span>
      <select [(ngModel)]="sortBy" (ngModelChange)="applyFilters()" [ngModelOptions]="{ standalone: true }" class="w-full rounded-full border border-black/10 px-4 py-3 outline-none focus:border-black/30">
        <option value="relevancia">Relevancia</option>
        <option value="precio-asc">Precio: menor a mayor</option>
        <option value="precio-desc">Precio: mayor a menor</option>
        <option value="novedades">Novedades</option>
      </select>
    </label>
  </aside>

  <section class="space-y-6">
    <div class="flex flex-wrap items-end justify-between gap-4">
      <div>
        <p class="text-xs uppercase tracking-[0.35em] text-black/45">Productos</p>
        <h2 class="section-title text-4xl text-[#111111]">Tu selección curada</h2>
      </div>
      <p class="text-sm text-black/55">{{ filteredProducts().length }} productos encontrados</p>
    </div>

    <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3">
      <app-product-card *ngFor="let product of filteredProducts()" [product]="product"></app-product-card>
    </div>

    <app-empty-state
      *ngIf="filteredProducts().length === 0"
      title="No encontramos resultados"
      description="Prueba ajustando los filtros de búsqueda, categoría o precio para descubrir otras piezas de la colección."
      actionLabel="Volver al inicio"
      actionRoute="/"
    ></app-empty-state>
  </section>
</div>
