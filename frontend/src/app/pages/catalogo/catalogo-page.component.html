<div 
  [ngClass]="categoryQuery() === 'lenceria' ? 'bg-[#0A0A0A] text-white p-6 md:p-10 rounded-[32px] border border-white/5 shadow-2xl' : ''"
  class="page-container space-y-8 py-8 xl:py-10 transition-all duration-500"
>
  <!-- Barra horizontal de navegación por pestañas de categoría -->
  <div class="flex items-center gap-2 overflow-x-auto pb-2 scrollbar-none border-b border-black/10" [ngClass]="categoryQuery() === 'lenceria' ? 'border-white/10' : ''">
    <button
      *ngFor="let tab of quickTabs"
      type="button"
      (click)="onTabSelect(tab.slug)"
      [ngClass]="selectedTab() === tab.slug 
        ? (categoryQuery() === 'lenceria' ? 'bg-white text-[#111111] font-bold shadow-sm' : 'bg-[#111111] text-white font-bold shadow-soft') 
        : (categoryQuery() === 'lenceria' ? 'bg-white/5 text-white/70 hover:bg-white/10 hover:text-white' : 'bg-white border border-black/10 text-black/70 hover:border-black/30 hover:text-black')"
      class="whitespace-nowrap rounded-full px-5 py-2.5 text-xs font-semibold uppercase tracking-wider transition-all duration-300"
    >
      {{ tab.label }}
    </button>
  </div>

  <div class="grid gap-8 xl:grid-cols-[300px_1fr]">
    <aside 
      [ngClass]="categoryQuery() === 'lenceria' ? 'bg-white/5 border-white/10 text-white shadow-none' : 'bg-white border-black/10 text-[#111111] shadow-soft'"
      class="space-y-6 rounded-[32px] border p-6 xl:sticky xl:top-28 xl:h-fit transition-colors duration-500"
    >
      <div>
        <p class="text-xs uppercase tracking-[0.35em]" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/40' : 'text-black/45'">Filtro</p>
        <h1 class="section-title mt-2 text-3xl" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white' : 'text-[#111111]'">Catálogo</h1>
      </div>

      <label class="block space-y-2 text-sm font-editorial">
        <span class="font-bold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/80' : 'text-black/80'">Buscar</span>
        <input 
          [ngModel]="searchTerm()" 
          (ngModelChange)="searchTerm.set($event)" 
          [ngModelOptions]="{ standalone: true }" 
          type="search" 
          placeholder="Encuentra tu prenda..." 
          [ngClass]="categoryQuery() === 'lenceria' ? 'bg-white/5 border-white/15 text-white focus:border-white/40' : 'bg-white border-black/10 text-[#111111] focus:border-[#111111]'"
          class="w-full rounded-full border px-4 py-3 outline-none transition text-sm"
        >
      </label>

      <label class="block space-y-2 text-sm font-editorial">
        <span class="font-bold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/80' : 'text-black/80'">Categoría</span>
        <select 
          [ngModel]="categoryFilter()" 
          (ngModelChange)="onCategoryChange($event)" 
          [ngModelOptions]="{ standalone: true }" 
          [ngClass]="categoryQuery() === 'lenceria' ? 'bg-[#141414] border-white/15 text-white focus:border-white/40' : 'bg-white border-black/10 text-[#111111] focus:border-[#111111]'"
          class="w-full rounded-full border px-4 py-3 outline-none transition text-sm font-medium"
        >
          <option value="all">Todas las categorías</option>
          <option *ngFor="let category of categories()" [value]="category.slug">{{ category.nombre }}</option>
        </select>
      </label>

      <label class="block space-y-2 text-sm font-editorial">
        <span class="font-bold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/80' : 'text-black/80'">Ordenar</span>
        <select 
          [ngModel]="sortBy()" 
          (ngModelChange)="sortBy.set($event)" 
          [ngModelOptions]="{ standalone: true }" 
          [ngClass]="categoryQuery() === 'lenceria' ? 'bg-[#141414] border-white/15 text-white focus:border-white/40' : 'bg-white border-black/10 text-[#111111] focus:border-[#111111]'"
          class="w-full rounded-full border px-4 py-3 outline-none transition text-sm font-medium"
        >
          <option value="relevancia">Relevancia</option>
          <option value="precio-asc">Precio: menor a mayor</option>
          <option value="precio-desc">Precio: mayor a menor</option>
          <option value="novedades">Novedades</option>
        </select>
      </label>
    </aside>

    <section class="space-y-6">
      <div class="flex flex-wrap items-end justify-between gap-4">
        <div>
          <p class="text-xs uppercase tracking-[0.35em]" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/40' : 'text-black/45'">Productos</p>
          <h2 class="section-title text-4xl" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white' : 'text-[#111111]'">Tu selección curada</h2>
        </div>
        <p class="text-sm font-editorial font-semibold" [ngClass]="categoryQuery() === 'lenceria' ? 'text-white/60' : 'text-black/60'">{{ filteredProducts().length }} productos encontrados</p>
      </div>

      <div class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
        <app-product-card 
          *ngFor="let product of filteredProducts()" 
          [product]="product"
          [theme]="categoryQuery() === 'lenceria' ? 'dark' : 'light'"
        ></app-product-card>
      </div>

      <app-empty-state
        *ngIf="filteredProducts().length === 0"
        title="No encontramos resultados"
        description="Prueba ajustando los filtros de búsqueda, categoría o precio para descubrir otras piezas de la colección."
        actionLabel="Ver todos los productos"
        actionRoute="/catalogo"
      ></app-empty-state>
    </section>
  </div>
</div>
