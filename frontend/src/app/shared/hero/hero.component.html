<section class="hero-shell overflow-hidden bg-white shadow-soft">
  <div class="hero-copy z-10 flex flex-col justify-center space-y-6 lg:space-y-8 py-10 px-4 sm:px-6 lg:py-16 lg:px-0 lg:pr-10 xl:pr-16">
    <div class="max-w-2xl">
      <p class="text-[0.75rem] font-bold uppercase tracking-[0.35em] text-black/50">Colección Tiendaintima</p>
      <h1 class="section-title mt-4 text-[clamp(3rem,6vw,6.5rem)] font-bold leading-[0.92] tracking-[-0.04em] text-[#111111]">{{ title }}</h1>
      <p class="mt-6 max-w-lg text-base leading-relaxed text-black/65 sm:text-lg lg:text-[1.15rem]">{{ subtitle }}</p>
      <div class="mt-10 flex flex-wrap items-center gap-4">
        <a [routerLink]="ctaLink" class="inline-flex items-center justify-center rounded-full bg-[#111111] px-8 py-4 text-sm font-bold uppercase tracking-[0.15em] text-white transition duration-300 hover:bg-black/80 hover:shadow-lg hover:-translate-y-0.5">
          {{ ctaLabel }}
        </a>
        <a routerLink="/nosotros" class="inline-flex items-center justify-center rounded-full border border-black/15 px-8 py-4 text-sm font-semibold text-black/70 transition duration-300 hover:border-black/40 hover:text-black hover:-translate-y-0.5">
          Conocer la marca
        </a>
      </div>
    </div>
  </div>

  <div class="hero-visual z-0 lg:min-h-[calc(100vh-6.5rem)]">
    <app-hero-images></app-hero-images>
  </div>
</section>
