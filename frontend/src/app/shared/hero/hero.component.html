<div class="relative w-full h-[85vh] min-h-[40rem] max-h-[60rem] overflow-hidden">
  <div
    #scrollContainer
    (scroll)="onScroll()"
    class="carousel-track-container h-full w-full overflow-x-auto scroll-smooth snap-x snap-mandatory [scrollbar-width:none] [-ms-overflow-style:none]"
  >
    <div class="flex h-full w-max">
      <div
        *ngFor="let item of items; let i = index"
        [id]="'slide-' + i"
        class="relative h-full w-screen flex-none snap-center"
      >
        <img
          [src]="item.img"
          [alt]="item.title"
          class="h-full w-full object-cover brightness-[0.8] contrast-[1.05] saturate-[0.9]"
          loading="lazy"
        />
        <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/30 to-black/10 lg:bg-gradient-to-r lg:from-black/80 lg:via-black/40 lg:to-transparent"></div>
        
        <div class="absolute inset-0 flex items-start">
          <div class="page-container w-full text-white pt-32 pb-10 lg:pt-36">
            <div class="max-w-3xl">
              <p class="mb-4 text-[0.85rem] font-bold uppercase tracking-[0.35em] text-white/80">
                Colección Tiendaintima
              </p>
              <h2 class="section-title mb-8 text-[clamp(4rem,9vw,9.5rem)] font-black leading-[0.9] tracking-[-0.04em]">
                {{ item.title }}
              </h2>
              <p class="mb-12 max-w-lg text-xl leading-relaxed text-white/90 lg:text-2xl">
                {{ item.subtitle }}
              </p>
              <a
                [routerLink]="item.link"
                class="inline-flex items-center justify-center rounded-full bg-white px-8 py-4 text-[0.9rem] font-bold uppercase tracking-[0.15em] text-[#111111] transition duration-300 hover:bg-[#F6EFEA] hover:shadow-lg hover:-translate-y-0.5"
              >
                {{ item.ctaText }}
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute bottom-8 left-0 right-0 z-10 flex justify-center gap-3">
    <button
      *ngFor="let dot of items; let i = index"
      (click)="scrollToSlide(i)"
      [ngClass]="{
        'w-10 bg-white': i === currentSlide,
        'w-3 bg-white/40': i !== currentSlide
      }"
      class="h-3 rounded-full border-0 p-0 transition-all duration-300 hover:bg-white/70"
      type="button"
      [attr.aria-label]="'Ir a la diapositiva ' + (i + 1)"
    ></button>
  </div>
</div>
