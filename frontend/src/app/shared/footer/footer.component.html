<footer class="border-t border-black/10 bg-[#111111] text-white">
  <div class="page-container grid gap-10 py-12 md:grid-cols-2">
    <div class="space-y-4">
      <p class="section-title text-4xl">Tiendaintima</p>
      <p class="max-w-md text-sm leading-7 text-white/70">Moda íntima y descanso con una curaduría cálida, femenina y minimalista. Boutique física y servicio a domicilio.</p>
    </div>
    <div class="grid gap-8 sm:grid-cols-2">
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-white/45">Explora</p>
        <ul class="mt-4 space-y-3 text-sm text-white/75">
          <li *ngFor="let item of footerLinks"><a [routerLink]="item.path" class="transition hover:text-white">{{ item.label }}</a></li>
        </ul>
      </div>
      <div>
        <p class="text-xs uppercase tracking-[0.3em] text-white/45">Redes</p>
        <ul class="mt-4 space-y-3 text-sm text-white/75">
          <li *ngFor="let item of socialLinks"><a [href]="item.href" target="_blank" rel="noreferrer" class="transition hover:text-white">{{ item.label }}</a></li>
        </ul>
      </div>
    </div>
  </div>
</footer>
