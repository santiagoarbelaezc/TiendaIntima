<nav class="fixed bottom-0 left-0 right-0 z-50 block lg:hidden bg-white/95 backdrop-blur-md border-t border-black/10 px-2 py-1.5 shadow-[0_-4px_20px_rgba(0,0,0,0.06)]">
  <div class="flex items-center justify-around">
    <a
      *ngFor="let item of navItems"
      [routerLink]="item.path"
      [queryParams]="item.queryParams ?? null"
      routerLinkActive="active-tab text-[#111111]"
      [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
      class="group relative flex flex-col items-center justify-center py-1 px-3 rounded-2xl transition-all duration-300 text-black/50 hover:text-[#111111]"
    >
      <div class="relative flex items-center justify-center h-6 w-6 transition-transform duration-300 group-active:scale-90">
        <!-- Icono Home -->
        <svg *ngIf="item.icon === 'home'" class="h-5 w-5 stroke-[1.8]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>

        <!-- Icono Catálogo -->
        <svg *ngIf="item.icon === 'grid'" class="h-5 w-5 stroke-[1.8]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
        </svg>

        <!-- Icono Novedades -->
        <svg *ngIf="item.icon === 'sparkles'" class="h-5 w-5 stroke-[1.8]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" />
        </svg>

        <!-- Icono Carrito -->
        <svg *ngIf="item.icon === 'cart'" class="h-5 w-5 stroke-[1.8]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
        <span *ngIf="item.icon === 'cart' && item.badge !== undefined" class="absolute -top-1 -right-2 inline-flex h-4 min-w-4 items-center justify-center rounded-full bg-[#EAC7D2] px-1 text-[9px] font-bold text-[#111111]">
          {{ item.badge }}
        </span>

        <!-- Icono Usuario -->
        <svg *ngIf="item.icon === 'user'" class="h-5 w-5 stroke-[1.8]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>

      <span class="mt-1 text-[10px] font-semibold tracking-wide font-editorial">
        {{ item.label }}
      </span>

      <!-- Indicador activo de punto -->
      <span class="indicator absolute -bottom-0.5 h-1 w-1 rounded-full bg-[#111111] opacity-0 transition-all duration-300"></span>
    </a>
  </div>
</nav>
