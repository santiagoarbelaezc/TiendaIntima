<section class="overflow-hidden rounded-[32px] bg-[#111111] text-white shadow-soft">
  <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr] lg:items-center">
    <div class="space-y-4 p-6 sm:p-8 lg:p-12">
      <p class="text-xs uppercase tracking-[0.35em] text-white/55">Promoción especial</p>
      <h2 class="section-title text-4xl leading-none sm:text-5xl">{{ title }}</h2>
      <p class="max-w-xl text-sm leading-7 text-white/75">{{ description }}</p>
    </div>
    <img [src]="image" alt="Promoción Tiendaintima" class="h-full w-full object-cover">
  </div>
</section>
