<section class="py-10 space-y-8">
  <div class="text-center max-w-2xl mx-auto space-y-3">
    <span class="inline-flex items-center gap-1.5 rounded-full bg-[#EAC7D2] px-3.5 py-1 text-[11px] font-bold uppercase tracking-[0.2em] text-[#111111]">
      Experiencias Reales
    </span>
    <h2 class="section-title text-4xl sm:text-5xl text-[#111111]">Lo que dicen nuestras clientas</h2>
    <p class="text-sm text-black/60 font-editorial">
      Miles de mujeres en el Eje Cafetero y toda Colombia confían en nuestra curaduría para sus momentos de paz y descanso en casa.
    </p>
  </div>

  <div class="grid gap-6 md:grid-cols-3">
    <div *ngFor="let item of items" class="testimonio-card rounded-[32px] border border-black/10 bg-[#FAFAFA] p-8 shadow-soft flex flex-col justify-between space-y-6">
      <div class="space-y-4">
        <!-- Rating Estrellas -->
        <div class="flex items-center gap-1 text-[#EAC7D2]">
          <svg *ngFor="let star of [1,2,3,4,5]" class="w-5 h-5 fill-current" viewBox="0 0 20 20">
            <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z" />
          </svg>
        </div>
        <p class="text-sm sm:text-base leading-relaxed text-black/75 font-editorial italic">
          "{{ item.comentario }}"
        </p>
      </div>

      <div class="pt-4 border-t border-black/10 flex items-center justify-between">
        <div>
          <h3 class="font-bold text-[#111111] text-base">{{ item.nombre }}</h3>
          <p class="text-xs text-black/50">{{ item.ciudad }}</p>
        </div>
        <span class="inline-block rounded-full bg-white border border-black/10 px-3 py-1 text-[10px] font-semibold text-[#111111]">
          {{ item.prenda }}
        </span>
      </div>
    </div>
  </div>
</section>
