<div class="rounded-[32px] border border-black/10 bg-white p-6 shadow-soft">
  <div class="grid gap-6 lg:grid-cols-[1.2fr_0.8fr]">
    <div class="grid gap-4 md:grid-cols-3">
      <a *ngFor="let category of categories" [routerLink]="['/catalogo']" class="rounded-[24px] border border-black/10 p-4 transition hover:-translate-y-0.5 hover:border-black/30">
        <p class="text-xs uppercase tracking-[0.28em] text-black/45">{{ category.slug }}</p>
        <h4 class="mt-3 text-base font-semibold text-[#111111]">{{ category.nombre }}</h4>
        <p class="mt-2 text-sm leading-6 text-black/60">{{ category.descripcion }}</p>
      </a>
    </div>
    <div class="overflow-hidden rounded-[28px] bg-[#F6EFEA] p-5">
      <p class="text-xs uppercase tracking-[0.3em] text-black/45">Colección destacada</p>
      <img [src]="categories.find(category => category.slug === activeSlug)?.imagen || categories[0]?.imagen" alt="Colección destacada" class="mt-4 h-full max-h-64 w-full rounded-[22px] object-cover">
    </div>
  </div>
</div>
