<header class="sticky top-0 z-50 border-b border-black/5 bg-white/95 backdrop-blur-xl">
  <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 md:px-6 xl:px-8">
    <button type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-black/10 lg:hidden" (click)="toggleMobileMenu()">
      <span class="sr-only">Abrir menú</span>
      <span class="block h-px w-5 bg-black"></span>
      <span class="mt-1 block h-px w-5 bg-black"></span>
      <span class="mt-1 block h-px w-5 bg-black"></span>
    </button>

    <a routerLink="/" class="flex items-center gap-3">
      <span class="flex h-10 w-10 items-center justify-center rounded-full bg-[#111111] text-sm font-bold text-white">T</span>
      <div>
        <p class="section-title text-2xl leading-none text-[#111111]">{{ brandName }}</p>
        <p class="text-[11px] uppercase tracking-[0.28em] text-black/45">Moda íntima y descanso</p>
      </div>
    </a>

    <nav class="hidden items-center gap-1 lg:flex">
      <a
        *ngFor="let item of navigationItems"
        [routerLink]="item.path"
        routerLinkActive="text-[#111111]"
        class="group relative rounded-full px-4 py-2 text-sm font-medium text-black/65 transition hover:text-[#111111]"
        (mouseenter)="item.category ? openMegaMenu(item.category) : closeMegaMenu()"
        (mouseleave)="closeMegaMenu()"
      >
        {{ item.label }}
        <span class="absolute inset-x-4 bottom-1 h-px scale-x-0 bg-[#111111] transition duration-200 group-hover:scale-x-100"></span>
      </a>
    </nav>

    <div class="flex items-center gap-2">
      <a routerLink="/login" class="hidden rounded-full border border-black/10 p-3 text-sm font-medium text-black/65 transition hover:border-black/30 hover:text-[#111111] md:inline-flex">Cuenta</a>
      <a routerLink="/carrito" class="relative inline-flex rounded-full border border-black/10 p-3 text-sm font-medium text-black/65 transition hover:border-black/30 hover:text-[#111111]">
        Carrito
        <span class="ml-2 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-[#EAC7D2] px-1 text-[11px] font-semibold text-[#111111]">0</span>
      </a>
    </div>
  </div>

  <div *ngIf="showMegaMenu()" class="mx-auto hidden max-w-7xl px-4 pb-4 lg:block xl:px-8">
    <app-mega-menu [categories]="categories()" [activeSlug]="activeMegaMenu()"></app-mega-menu>
  </div>

  <div *ngIf="mobileMenuOpen()" class="fixed inset-0 z-50 bg-white/98 p-5 lg:hidden">
    <div class="flex items-center justify-between">
      <p class="section-title text-3xl">{{ brandName }}</p>
      <button type="button" class="rounded-full border border-black/10 px-4 py-2 text-sm" (click)="toggleMobileMenu()">Cerrar</button>
    </div>
    <div class="mt-8 grid gap-3">
      <a *ngFor="let item of navigationItems" [routerLink]="item.path" class="rounded-[22px] border border-black/10 px-4 py-4 text-lg font-medium" (click)="toggleMobileMenu()">{{ item.label }}</a>
    </div>
  </div>
</header>
