<header 
  [ngClass]="(!isDarkBackgroundPage() || scrolled()) ? 'bg-white/95 text-[#111111] border-black/5 shadow-soft py-2' : 'bg-transparent text-white border-transparent py-4'"
  class="fixed top-0 left-0 right-0 z-50 border-b transition-all duration-300 backdrop-blur-md"
>
  <div class="page-container flex items-center justify-between gap-4">
    <a routerLink="/" class="flex items-center gap-3">
      <img src="assets/icons/logo-tiendaintimanavbar.png" [alt]="brandName" class="h-10 w-auto object-contain transition-all duration-300" />
      <div>
        <p class="section-title text-2xl leading-none transition-colors duration-300" [ngClass]="(!isDarkBackgroundPage() || scrolled()) ? 'text-[#111111]' : 'text-white'">{{ brandName }}</p>
        <p class="text-[11px] uppercase tracking-[0.28em] opacity-60">Moda íntima y descanso</p>
      </div>
    </a>

    <nav class="hidden items-center gap-1 lg:flex">
      <a
        *ngFor="let item of navigationItems"
        [routerLink]="item.path"
        [queryParams]="item.category ? { categoria: item.category } : (item.filter ? { filter: item.filter } : null)"
        routerLinkActive="font-semibold opacity-100"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        class="group relative rounded-full px-4 py-2 text-sm font-medium opacity-85 transition hover:opacity-100"
        (mouseenter)="item.label === 'Catálogo' ? openMegaMenu('all') : scheduleCloseMegaMenu()"
        (mouseleave)="item.label === 'Catálogo' ? scheduleCloseMegaMenu() : null"
      >
        {{ item.label }}
        <span class="absolute inset-x-4 bottom-1 h-px scale-x-0 bg-current transition duration-200 group-hover:scale-x-100"></span>
      </a>
    </nav>

    <div class="hidden items-center gap-2 lg:flex">
      <a routerLink="/login" class="rounded-full border border-current/20 p-3 text-sm font-medium opacity-85 transition hover:opacity-100 hover:border-current/40 md:inline-flex">Mi cuenta</a>
      <a routerLink="/carrito" class="relative inline-flex rounded-full border border-current/20 p-3 text-sm font-medium opacity-85 transition hover:opacity-100 hover:border-current/40">
        Carrito
        <span class="ml-2 inline-flex h-5 min-w-5 items-center justify-center rounded-full bg-[#EAC7D2] px-1 text-[11px] font-semibold text-[#111111]">0</span>
      </a>
    </div>

    <button type="button" class="inline-flex h-11 w-11 items-center justify-center rounded-full border border-current/20 lg:hidden" (click)="toggleMobileMenu()">
      <span class="sr-only">Abrir menú</span>
      <div class="flex flex-col gap-1.5 items-center">
        <span class="block h-0.5 w-5 bg-current transition-transform duration-300"></span>
        <span class="block h-0.5 w-5 bg-current transition-transform duration-300"></span>
        <span class="block h-0.5 w-5 bg-current transition-transform duration-300"></span>
      </div>
    </button>
  </div>

  <div *ngIf="showMegaMenu()" class="page-container hidden pb-4 lg:block" (mouseenter)="openMegaMenu('all')" (mouseleave)="scheduleCloseMegaMenu()">
    <app-mega-menu [categories]="categories()" [activeSlug]="activeMegaMenu()" (itemClick)="closeMegaMenu()"></app-mega-menu>
  </div>
</header>

<!-- Backdrop oscuro para mobile drawer (fuera del header) -->
  <div 
    class="fixed inset-0 z-[99] bg-black/60 backdrop-blur-sm transition-opacity duration-300 lg:hidden"
    [ngClass]="mobileMenuOpen() ? 'opacity-100 pointer-events-auto' : 'opacity-0 pointer-events-none'"
    (click)="toggleMobileMenu()"
  ></div>

  <!-- Drawer Lateral Deslizante -->
  <div 
    class="fixed top-0 right-0 bottom-0 z-[100] h-screen w-[85vw] max-w-[340px] bg-white shadow-2xl flex flex-col transition-transform duration-300 ease-in-out lg:hidden"
    [ngClass]="mobileMenuOpen() ? 'translate-x-0' : 'translate-x-full'"
  >
    <!-- Header del Drawer -->
    <div class="flex items-center justify-between p-5 border-b border-black/8">
      <div class="flex items-center gap-2.5">
        <img src="assets/icons/logo-tiendaintimanavbar.png" [alt]="brandName" class="h-8 w-auto object-contain" />
        <div>
          <p class="section-title text-xl leading-none text-[#111111]">{{ brandName }}</p>
          <p class="text-[9px] uppercase tracking-[0.25em] opacity-60">Moda íntima</p>
        </div>
      </div>
      <button 
        type="button" 
        class="flex h-9 w-9 items-center justify-center rounded-full border border-black/10 text-black/70 hover:bg-black/5 transition"
        (click)="toggleMobileMenu()"
      >
        ✕
      </button>
    </div>

    <!-- Lista de Navegación con Íconos -->
    <div class="flex-1 overflow-y-auto p-4 space-y-1.5 font-editorial">
      <a 
        *ngFor="let item of navigationItems" 
        [routerLink]="item.path" 
        [queryParams]="item.category ? { categoria: item.category } : (item.filter ? { filter: item.filter } : null)" 
        routerLinkActive="bg-[#F8F6F4] text-[#111111] font-bold"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
        class="flex items-center justify-between rounded-2xl px-4 py-3.5 text-sm text-black/80 hover:bg-black/5 transition duration-200"
        (click)="toggleMobileMenu()"
      >
        <span class="flex items-center gap-3">
          <svg *ngIf="item.label === 'Inicio'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <svg *ngIf="item.label === 'Catálogo'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
          <svg *ngIf="item.label === 'Ropa interior'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.684a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
          <svg *ngIf="item.label === 'Pijamas'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
          <svg *ngIf="item.label === 'Hombre'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <svg *ngIf="item.label === 'Novedades'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
          <svg *ngIf="item.label === 'Promociones'" class="w-4 h-4 stroke-[1.8] text-black/60" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
          {{ item.label }}
        </span>
        <span class="text-xs text-black/30">&rarr;</span>
      </a>

      <!-- Separador y accesos rápidos -->
      <div class="pt-4 pb-2 border-t border-black/8 space-y-2">
        <p class="px-4 text-[10px] font-bold uppercase tracking-[0.25em] text-black/40">Accesos Directos</p>
        <div class="grid grid-cols-2 gap-2">
          <a routerLink="/carrito" (click)="toggleMobileMenu()" class="flex items-center justify-center gap-2 rounded-2xl border border-black/10 p-3 text-xs font-semibold text-[#111111] hover:bg-[#EAC7D2]/20 transition">
            🛒 Carrito (0)
          </a>
          <a routerLink="/login" (click)="toggleMobileMenu()" class="flex items-center justify-center gap-2 rounded-2xl border border-black/10 p-3 text-xs font-semibold text-[#111111] hover:bg-[#EAC7D2]/20 transition">
            👤 Mi Cuenta
          </a>
        </div>
      </div>
    </div>

    <!-- Footer del Drawer -->
    <div class="p-5 border-t border-black/8 bg-[#FAFAFA] space-y-3 font-editorial text-xs text-black/60">
      <div class="flex items-center gap-3">
        <a *ngFor="let item of socialLinks" [href]="item.href" target="_blank" rel="noreferrer" class="rounded-full bg-white border border-black/10 px-3 py-1 text-[11px] font-semibold text-[#111111] hover:bg-[#111111] hover:text-white transition">
          {{ item.label }}
        </a>
      </div>
      <p class="text-[11px] leading-relaxed">📍 Boutique física en Calarcá, Quindío. Envíos locales a domicilio.</p>
    </div>
  </div>
